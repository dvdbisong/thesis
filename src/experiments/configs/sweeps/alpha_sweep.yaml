# Alpha (Learning Rate) Parameter Sweep
# Tests different learning rates for LR-I

experiment:
  name: "alpha_sweep"
  description: "Learning rate sensitivity analysis for LR-I"

sweep:
  parameter: "automaton.alpha"
  values: [0.001, 0.005, 0.01, 0.02, 0.05, 0.1]

seeds: [42, 123, 456, 789, 1011]

automaton:
  type: "LR-I"
  initial_prob: "uniform"

training:
  num_epochs: 20
